<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ATDD Dashboard{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/dashboard.css?v={{ asset_version }}">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>

  <!-- Icon Strip -->
  {% include "partials/_icon_strip.html" %}

  <!-- Sidebar Panel -->
  {% include "partials/_nav.html" %}

  <!-- Main Content -->
  <div class="main-wrapper">
    <div class="main">
      {% block content %}{% endblock %}
    </div>
  </div>

  {% block scripts %}{% endblock %}
  <script>
  // SSE: Auto-refresh dashboard on server events
  (function() {
    const evtSource = new EventSource('/api/v1/events/stream');
    const refreshEvents = ['task.updated', 'task.created', 'domain.recalculated',
                           'report.generated', 'deploy.verified', 'deploy.alert'];

    refreshEvents.forEach(function(evt) {
      evtSource.addEventListener(evt, function(e) {
        const data = JSON.parse(e.data);
        const toast = document.createElement('div');
        toast.className = 'sse-toast';
        toast.textContent = evt.replace('.', ' ') + ': ' + JSON.stringify(data);
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 5000);

        // Refresh current page content via HTMX
        const content = document.querySelector('.main');
        if (content) {
          htmx.ajax('GET', window.location.pathname, {target: '.main', swap: 'innerHTML'});
        }
      });
    });

    evtSource.onerror = function() {
      console.log('SSE connection lost, will retry...');
    };
  })();

  // Sidebar toggle JS
  document.querySelectorAll('.sidebar-toggle').forEach(function(btn) {
    btn.addEventListener('click', function() {
      this.classList.toggle('open');
      var nested = this.nextElementSibling;
      if (nested) nested.classList.toggle('open');
    });
  });
  </script>
</body>
</html>
