<!-- HTMX partial: overview metrics content -->
<div class="kpi-grid">
  <div class="kpi-card highlight">
    <div class="kpi-label">Tasks Created</div>
    <div class="kpi-value">{{ total_created }}</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">Completion Rate</div>
    <div class="kpi-value" style="color: var(--success);">{{ completion_rate }}%</div>
    <div class="kpi-trend up">{{ total_completed }} completed</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">Fix Rate</div>
    <div class="kpi-value" style="color: var(--warning);">{{ fix_rate }}%</div>
    <div class="kpi-trend down">Fixes / Features</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">Escape Rate</div>
    <div class="kpi-value" style="color: {% if escape_rate > 5 %}var(--danger){% else %}var(--teal){% endif %};">{{ escape_rate }}%</div>
  </div>
</div>

<div class="chart-row">
  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-title">Weekly Trend</div>
        <div class="card-subtitle">Created vs Completed tasks over time</div>
      </div>
    </div>
    <div class="chart-container">
      <canvas id="trendChart"></canvas>
    </div>
  </div>
  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-title">Cost by Task Type</div>
        <div class="card-subtitle">Tool uses and token consumption</div>
      </div>
    </div>
    <div class="chart-container">
      <canvas id="costChart"></canvas>
    </div>
  </div>
</div>

<script>
Chart.defaults.font.family = "'Inter', -apple-system, sans-serif";
Chart.defaults.font.size = 12;
Chart.defaults.color = '#6B7280';
Chart.defaults.plugins.legend.labels.usePointStyle = true;
Chart.defaults.plugins.legend.labels.pointStyleWidth = 8;

var trendCtx = document.getElementById('trendChart');
if (trendCtx) {
  if (trendCtx._chart) trendCtx._chart.destroy();
  trendCtx._chart = new Chart(trendCtx, {
    type: 'line',
    data: {
      labels: {{ trend_labels|safe }},
      datasets: [
        { label: 'Created', data: {{ trend_created|safe }}, borderColor: '#6B9EB3', backgroundColor: 'rgba(107, 158, 179, 0.08)', fill: true, tension: 0.4, pointRadius: 4, borderWidth: 2.5 },
        { label: 'Completed', data: {{ trend_completed|safe }}, borderColor: '#16A34A', backgroundColor: 'rgba(22, 163, 74, 0.08)', fill: true, tension: 0.4, pointRadius: 4, borderWidth: 2.5 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: { legend: { position: 'top', align: 'end' } },
      scales: {
        x: { grid: { display: false }, border: { display: false } },
        y: { grid: { color: '#F3F4F6' }, border: { display: false }, beginAtZero: true }
      }
    }
  });
}

var costCtx = document.getElementById('costChart');
if (costCtx) {
  if (costCtx._chart) costCtx._chart.destroy();
  costCtx._chart = new Chart(costCtx, {
    type: 'bar',
    data: {
      labels: {{ cost_labels|safe }},
      datasets: [
        { label: 'Tool Uses', data: {{ cost_tools|safe }}, backgroundColor: '#2563EB', borderRadius: 6, barPercentage: 0.6 },
        { label: 'Tokens (k)', data: {{ cost_tokens|safe }}.map(v => Math.round(v/1000)), backgroundColor: '#7C3AED', borderRadius: 6, barPercentage: 0.6 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, border: { display: false } },
        y: { grid: { color: '#F3F4F6' }, border: { display: false }, beginAtZero: true }
      }
    }
  });
}
</script>
