<div class="filters">
  <div class="filter-group">
    {% for p_val, p_label in [('7d','7d'), ('30d','30d'), ('90d','90d'), ('all','All')] %}
    <button {% if period == p_val %}class="active"{% endif %}
            hx-get="/dashboard/"
            hx-target="#metrics"
            hx-swap="innerHTML"
            hx-vals='{"period":"{{ p_val }}"{% if project %},"project":"{{ project }}"{% endif %}'
            hx-push-url="false">{{ p_label }}</button>
    {% endfor %}
  </div>
  {% if projects %}
  <select class="filter-select" name="project"
          hx-get="/dashboard/"
          hx-target="#metrics"
          hx-swap="innerHTML"
          hx-push-url="false"
          hx-include="previous .filter-group button.active">
    <option value="">All Projects</option>
    {% for p in projects %}
    <option value="{{ p }}" {% if project == p %}selected{% endif %}>{{ p }}</option>
    {% endfor %}
  </select>
  {% endif %}
</div>
