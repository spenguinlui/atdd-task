<fieldset role="group" class="time-selector">
  <select name="period"
          hx-get="/dashboard/"
          hx-target="#metrics"
          hx-swap="innerHTML"
          hx-push-url="false">
    <option value="7d" {% if period == '7d' %}selected{% endif %}>Last 7 days</option>
    <option value="30d" {% if period == '30d' %}selected{% endif %}>Last 30 days</option>
    <option value="90d" {% if period == '90d' %}selected{% endif %}>Last 90 days</option>
    <option value="all" {% if period == 'all' %}selected{% endif %}>All time</option>
  </select>
  {% if projects %}
  <select name="project"
          hx-get="/dashboard/"
          hx-target="#metrics"
          hx-swap="innerHTML"
          hx-push-url="false"
          hx-include="[name='period']">
    <option value="">All projects</option>
    {% for p in projects %}
    <option value="{{ p }}" {% if project == p %}selected{% endif %}>{{ p }}</option>
    {% endfor %}
  </select>
  {% endif %}
</fieldset>
