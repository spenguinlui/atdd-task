    capacity_per_panel: 445
    sale_price_per_kw: "72,400"
    total_cost: "708,796"
    net_income: "432,675"
    irr: 0.0501
    cash_flow_count: 21
    cash_flow_year0_due: "-708,796"

  scenarios:
    - file: scenarios/S1-error-nil-panels.yml
      id: S1
      title: "S1-error: number_of_panels=nil 不得 500，顯示缺『模組片數』提示"
      dependencies: []

