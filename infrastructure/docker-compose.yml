services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: atdd
      POSTGRES_USER: atdd
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atdd}
    ports:
      # Expose to localhost only (for SSH tunnel from local dev)
      - "127.0.0.1:${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atdd"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ../ports/api
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://atdd:${POSTGRES_PASSWORD:-atdd}@db:5432/atdd
      - API_KEY=${API_KEY:-}
      - ATDD_ORG=${ATDD_ORG:-00000000-0000-0000-0000-000000000001}
      - REMOTE_DASHBOARD_URL=${REMOTE_DASHBOARD_URL:-}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      # Mount data/db for migrations
      - ../data/db:/app/db:ro
      # Mount worker for API worker triggers
      - ../ports/worker:/app/worker:ro
    depends_on:
      db:
        condition: service_healthy

  bot:
    build: ../ports/slack
    restart: unless-stopped
    env_file: .env
    environment:
      - ATDD_HUB_PATH=/app/atdd-hub
      - API_BASE_URL=http://api:8000
      - API_KEY=${API_KEY:-}
    volumes:
      # atdd-hub repo (server clone, single writer)
      - ${ATDD_HUB_PATH:-/home/ubuntu/atdd-hub}:/app/atdd-hub
      # Claude CLI session persistence (claude login + conversation sessions)
      - claude-data:/home/app/.claude
    depends_on:
      - api

  triage-bot:
    build: ../ports/triage-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - ATDD_HUB_PATH=/app/atdd-hub
      - REPOS_PATH=/app/repos
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - JIRA_BASE_URL=${JIRA_BASE_URL:-}
      - JIRA_EMAIL=${JIRA_EMAIL:-}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN:-}
      - JIRA_PROJECT_KEY=${JIRA_PROJECT_KEY:-CORE}
      - JIRA_ISSUE_TYPE=${JIRA_ISSUE_TYPE:-Bug}
      - TRIAGE_CHANNEL_ID=${TRIAGE_CHANNEL_ID:-}
      - PM_CHANNEL_ID=${PM_CHANNEL_ID:-}
      - RD_LEAD_SLACK_USER_ID=${RD_LEAD_SLACK_USER_ID:-}
    volumes:
      # atdd-hub repo (read-only access)
      - ${ATDD_HUB_PATH:-/home/ubuntu/atdd-hub}:/app/atdd-hub:ro
      # Project code repos (read-only for analysis)
      - ${REPOS_PATH:-/home/ubuntu/repos}:/app/repos:ro
      # Claude CLI session persistence
      - claude-data:/home/app/.claude
    depends_on:
      - api

  worker:
    build: ../ports/api
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://atdd:${POSTGRES_PASSWORD:-atdd}@db:5432/atdd
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["python3", "/app/worker/scheduler.py"]
    volumes:
      - ../ports/worker:/app/worker:ro
      - ../data/db:/app/db:ro

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api

volumes:
  pgdata:
  claude-data:
