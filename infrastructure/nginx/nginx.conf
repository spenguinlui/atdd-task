events {
    worker_connections 256;
}

http {
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=dashboard:10m rate=60r/m;

    upstream api {
        server api:8000;
    }

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/letsencrypt/live/atdd.sunnyfounder.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/atdd.sunnyfounder.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # API routes
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SSE (no buffering)
        location /api/v1/events/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400;
        }

        # Dashboard
        location /dashboard {
            limit_req zone=dashboard burst=20 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static files
        location /static/ {
            proxy_pass http://api;
            expires 1d;
        }

        # Health check (public)
        location /health {
            proxy_pass http://api;
        }
    }
}
