events {
    worker_connections 64;
}

http {
    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name atdd.sunnyfounder.com;
        return 301 https://$host$request_uri;
    }

    # HTTPS — Dev API endpoint (Phase 4+)
    server {
        listen 443 ssl;
        server_name atdd.sunnyfounder.com;

        ssl_certificate     /etc/letsencrypt/live/atdd.sunnyfounder.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/atdd.sunnyfounder.com/privkey.pem;

        # Health check
        location /health {
            proxy_pass http://api:8000/health;
        }

        # API (Phase 2)
        location /api/ {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Dashboard (Phase 4)
        location /dashboard {
            proxy_pass http://api:8000/dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static assets
        location /static/ {
            proxy_pass http://api:8000/static/;
            expires 1h;
        }
    }
}
