{% extends "base.html" %}
{% block title %}Task Board — ATDD Dashboard{% endblock %}

{% block content %}
<hgroup>
  <h2>Task Board</h2>
  <p>Active tasks across all projects</p>
</hgroup>

<fieldset role="group" class="time-selector">
  <select name="project" hx-get="/dashboard/tasks" hx-target="#board" hx-include="[name='type']">
    <option value="">All projects</option>
    {% for p in projects %}
    <option value="{{ p }}" {% if project == p %}selected{% endif %}>{{ p }}</option>
    {% endfor %}
  </select>
  <select name="type" hx-get="/dashboard/tasks" hx-target="#board" hx-include="[name='project']">
    <option value="">All types</option>
    <option value="feature" {% if type == 'feature' %}selected{% endif %}>Feature</option>
    <option value="fix" {% if type == 'fix' %}selected{% endif %}>Fix</option>
    <option value="refactor" {% if type == 'refactor' %}selected{% endif %}>Refactor</option>
    <option value="test" {% if type == 'test' %}selected{% endif %}>Test</option>
  </select>
</fieldset>

<div id="board">
{% include "pages/_task_board_inner.html" %}
</div>

<dialog id="taskModal" class="task-modal">
  <article>
    <header>
      <button aria-label="Close" rel="prev" onclick="document.getElementById('taskModal').close()"></button>
      <h3>Task Detail</h3>
    </header>
    <div id="modal-content">
      <p>Loading...</p>
    </div>
  </article>
</dialog>

<script>
document.body.addEventListener('htmx:afterSwap', function(e) {
  if (e.detail.target.id === 'modal-content') {
    document.getElementById('taskModal').showModal();
  }
});
</script>
{% endblock %}
