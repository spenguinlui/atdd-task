<!-- HTMX partial: kanban board columns -->
<div class="kanban-board">
  {% for col in columns %}
  <div class="kanban-column">
    <div class="kanban-column-header">
      {{ col }}
      <span class="kanban-count">{{ board[col]|length }}</span>
    </div>
    {% for task in board[col] %}
    <div class="task-card"
         hx-get="/dashboard/tasks/{{ task.id }}/detail"
         hx-target="#modal-content"
         hx-swap="innerHTML">
      <div class="task-type task-type-{{ task.type }}">{{ task.type }}</div>
      <div>{{ task.description or '(no description)' }}</div>
      <div style="font-size:0.7rem; color:var(--pico-muted-color); margin-top:0.3rem;">
        {{ task.project }}{% if task.domain %} / {{ task.domain }}{% endif %}
      </div>
    </div>
    {% endfor %}
    {% if not board[col] %}
    <div class="empty-state" style="padding:1rem; font-size:0.8rem;">No tasks</div>
    {% endif %}
  </div>
  {% endfor %}
</div>
